lora:
  rank: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "out_proj"

  # These flags must be nested inside `lora:` — the script reads lora_cfg[...]
  apply_to_vision_encoder: true      # domain shift: photos -> manuscript line art
  apply_to_text_encoder: false       # turn on later only if "formation diagram" recall is broken
  apply_to_geometry_encoder: false
  apply_to_detr_encoder: false
  apply_to_detr_decoder: true        # classifier needs to separate sword vs pole-arm
  apply_to_mask_decoder: true        # refine thin-line boundaries

training:
  data_dir: "data"
  batch_size: 8
  num_epochs: 15
  learning_rate: 5e-5
  weight_decay: 0.01
  gradient_accumulation_steps: 8     # effective batch = 64

output:
  output_dir: "outputs/sam3_lora_lite"
